<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order WOWO - Solusi Transaksi Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    /* Custom Scrollbar untuk Select Option */
    select option { background: #1f2937; color: white; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-purple-950 text-white flex items-center justify-center min-h-screen p-4">

<div class="bg-gray-900/40 backdrop-blur-xl shadow-2xl p-8 rounded-3xl w-full max-w-lg border border-white/10">
  <div class="text-center mb-8">
    <div class="inline-block p-3 bg-purple-500/10 rounded-2xl mb-4">
        <i class="fa-solid fa-rocket text-purple-400 text-3xl"></i>
    </div>
    <h2 class="text-3xl font-black tracking-tight text-white">Form Order <span class="text-purple-400">WOWO</span></h2>
    <p class="text-gray-400 text-sm mt-2">Proses otomatis, aman, dan terpercaya.</p>
  </div>
  
  <form id="orderForm" class="space-y-4">
    <div class="relative">
        <i class="fa-solid fa-user absolute left-4 top-4 text-gray-500"></i>
        <input id="nama" type="text" placeholder="Nama Lengkap" class="w-full pl-12 p-4 rounded-2xl bg-gray-800/50 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5 transition" required>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="relative">
            <i class="fa-brands fa-whatsapp absolute left-4 top-4 text-gray-500"></i>
            <input id="wa" type="number" placeholder="WA (Contoh: 0812...)" class="w-full pl-12 p-4 rounded-2xl bg-gray-800/50 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5 transition" required>
        </div>
        <div class="relative">
            <i class="fa-solid fa-phone-flip absolute left-4 top-4 text-gray-500"></i>
            <input id="tujuan" type="number" placeholder="No HP Tujuan / ID" class="w-full pl-12 p-4 rounded-2xl bg-gray-800/50 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5 transition" required>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <select id="layanan" class="w-full p-4 rounded-2xl bg-gray-800/50 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5 text-gray-300 cursor-pointer" required>
          <option value="" disabled selected>Pilih Layanan</option>
          <option value="DANA">Top Up DANA</option>
          <option value="GoPay">Top Up GoPay</option>
          <option value="Pulsa">Pulsa All Operator</option>
          <option value="Kuota">Kuota Internet</option>
          <option value="Token PLN">Token PLN</option>
        </select>

        <select id="nominal" class="w-full p-4 rounded-2xl bg-gray-800/50 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5 text-gray-300 cursor-pointer" required disabled>
          <option value="" disabled selected>Pilih Nominal</option>
        </select>
    </div>
    
    <button type="submit" id="btnKirim" class="w-full mt-4 bg-gradient-to-r from-purple-600 to-indigo-700 p-4 rounded-2xl font-bold text-lg hover:shadow-lg hover:shadow-purple-500/30 active:scale-95 transition-all disabled:opacity-50">
      Kirim Pesanan Sekarang
    </button>
  </form>
</div>

<div id="successPopup" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
  <div class="bg-gray-900 p-8 rounded-3xl text-center shadow-2xl max-w-sm w-full border border-purple-500/30 scale-90 transition-transform">
    <div class="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">
        <i class="fa-solid fa-check"></i>
    </div>
    <h2 class="text-2xl font-bold mb-2">Order Berhasil!</h2>
    <p class="text-gray-400 mb-8">Pesanan Anda telah dicatat. Silakan selesaikan pembayaran di WhatsApp.</p>
    <button onclick="closePopup()" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-gray-200 transition">Tutup</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
  authDomain: "uasbima-2c5d7.firebaseapp.com",
  projectId: "uasbima-2c5d7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("orderForm");
const btnKirim = document.getElementById("btnKirim");
const selectLayanan = document.getElementById("layanan");
const selectNominal = document.getElementById("nominal");

const opsiHarga = {
  "DANA": [
    { label: "DANA 10k (Rp 12.000)", val: "10.000", hrg: "12.000" },
    { label: "DANA 20k (Rp 22.000)", val: "20.000", hrg: "22.000" },
    { label: "DANA 50k (Rp 52.000)", val: "50.000", hrg: "52.000" },
    { label: "DANA 100k (Rp 102.000)", val: "100.000", hrg: "102.000" }
  ],
  "GoPay": [
    { label: "GoPay 10k (Rp 12.000)", val: "10.000", hrg: "12.000" },
    { label: "GoPay 20k (Rp 22.000)", val: "20.000", hrg: "22.000" }
  ],
  "Pulsa": [
    { label: "5.000 (Rp 7.000)", val: "5.000", hrg: "7.000" },
    { label: "10.000 (Rp 12.000)", val: "10.000", hrg: "12.000" },
    { label: "50.000 (Rp 52.000)", val: "50.000", hrg: "52.000" }
  ],
  "Kuota": [
    { label: "1 GB (Rp 12.000)", val: "1 GB", hrg: "12.000" },
    { label: "5 GB (Rp 37.000)", val: "5 GB", hrg: "37.000" }
  ],
  "Token PLN": [
    { label: "20.000 (Rp 22.000)", val: "20.000", hrg: "22.000" },
    { label: "50.000 (Rp 52.000)", val: "50.000", hrg: "52.000" }
  ]
};

selectLayanan.addEventListener("change", () => {
  const pilihan = selectLayanan.value;
  selectNominal.innerHTML = '<option value="" disabled selected>Pilih Nominal</option>';
  selectNominal.disabled = false;
  
  if (opsiHarga[pilihan]) {
    opsiHarga[pilihan].forEach(item => {
      const option = document.createElement("option");
      option.value = `${item.val}|${item.hrg}`;
      option.textContent = item.label;
      selectNominal.appendChild(option);
    });
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btnKirim.disabled = true;
  btnKirim.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Mengamankan Pesanan...';

  const [nomVal, hargaVal] = selectNominal.value.split('|');
  
  const data = {
    orderId: "WOWO-" + Math.floor(100000 + Math.random() * 900000),
    nama: document.getElementById("nama").value,
    wa_pelanggan: document.getElementById("wa").value,
    layanan: selectLayanan.value,
    nominal: nomVal,
    total_harga: hargaVal,
    tujuan: document.getElementById("tujuan").value,
    status: "Pending",
    createdAt: serverTimestamp()
  };

  try {
    await addDoc(collection(db, "order"), data);

    const nomorAdmin = "6283148583173"; 
    const pesanWA = `*ORDER BARU - WOWO STORE*\n` +
                    `--------------------------------\n` +
                    `*ID Order :* ${data.orderId}\n` +
                    `*Nama :* ${data.nama}\n` +
                    `*Layanan :* ${data.layanan}\n` +
                    `*Nominal :* ${data.nominal}\n` +
                    `*Tujuan :* ${data.tujuan}\n` +
                    `*Total Bayar :* Rp ${data.total_harga}\n` +
                    `--------------------------------\n` +
                    `_Mohon segera diproses Admin!_`;
    
    window.open(`https://wa.me/${nomorAdmin}?text=${encodeURIComponent(pesanWA)}`, '_blank');

    document.getElementById("successPopup").classList.replace("hidden", "flex");
    form.reset();
    selectNominal.disabled = true;
  } catch (err) {
    alert("Maaf, terjadi kesalahan sistem. Silakan coba lagi.");
    console.error(err);
  } finally {
    btnKirim.disabled = false;
    btnKirim.innerText = "Kirim Pesanan Sekarang";
  }
});

window.closePopup = () => {
  document.getElementById("successPopup").classList.replace("flex", "hidden");
};
</script>
</body>
</html>
