<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cara Kerja</title>

    <!-- WAJIB -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<section class="relative py-20 bg-gradient-to-br from-blue-900 to-blue-800 text-white overflow-hidden min-h-screen">

    <!-- SHAPE -->
    <div class="absolute right-0 top-0 w-1/2 h-full">
        <div class="w-full h-full bg-blue-800 clip-path-diagonal"></div>
    </div>

    <div class="relative z-10 max-w-6xl mx-auto px-6">

        <!-- TITLE -->
        <h2 class="text-4xl font-bold">
            CARA KERJA <br>
            <span class="text-orange-400">MUDAH & CEPAT</span>
        </h2>

        <p class="mt-3 text-blue-200">Top up dalam 3 langkah simpel.</p>

        <!-- STEP -->
        <div class="mt-16 grid md:grid-cols-3 gap-10 text-center">

            <div>
                <div class="bg-white text-black p-10 rounded-2xl shadow-xl">
                    <img src="dompet.png" class="w-12 mx-auto">
                </div>
                <p class="mt-4 font-semibold">
                    <span class="text-orange-400">1.</span> Pilih Layanan
                </p>
            </div>

            <div>
                <div class="bg-white text-black p-10 rounded-2xl shadow-xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991108.png" class="w-12 mx-auto">
                </div>
                <p class="mt-4 font-semibold">
                    <span class="text-orange-400">2.</span> Masukkan Data
                </p>
            </div>

            <div>
                <div class="bg-white text-black p-10 rounded-2xl shadow-xl">
                    <img src="orang transaksi.png" class="w-12 mx-auto">
                </div>
                <p class="mt-4 font-semibold">
                    <span class="text-orange-400">3.</span> Bayar & Selesai
                </p>
            </div>

        </div>

    </div>

</section>

</body>
</html>
