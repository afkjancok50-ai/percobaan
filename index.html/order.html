<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfirmasi Pesanan - BIMA Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #e2e8f0; background-image: radial-gradient(circle at 50% -20%, rgba(147, 51, 234, 0.15) 0%, rgba(0, 0, 0, 0) 50%); }
    .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .order-card { background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
    input, select { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white; transition: all 0.3s ease; }
    input:focus, select:focus { border-color: #a855f7 !important; background: rgba(168, 85, 247, 0.05) !important; }
    .star-active { color: #fbbf24 !important; transform: scale(1.2); }
    select option { background: #0f172a; color: white; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="fixed top-0 w-full glass-nav z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="p-2 bg-zinc-800 rounded-xl group-hover:bg-purple-600 transition-all">
            <i class="fa-solid fa-arrow-left text-white text-sm"></i>
        </div>
        <h1 class="text-xl font-black tracking-tighter text-white uppercase">BIMA<span class="text-purple-500">.</span></h1>
      </a>
      <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500 border border-white/10 px-3 py-1 rounded-full">Secure Payment</span>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center p-6 pt-28 pb-12">
    <div class="order-card p-8 md:p-10 rounded-[2.5rem] w-full max-w-lg relative overflow-hidden">
      <div class="absolute -top-24 -right-24 w-64 h-64 bg-purple-600/10 blur-[100px]"></div>
      <div class="text-center mb-10">
        <h2 class="text-4xl font-black text-white tracking-tight">Checkout</h2>
        <p class="text-gray-400 text-sm mt-2 font-medium">Lengkapi detail pesanan Anda.</p>
      </div>

      <form id="orderForm" class="space-y-6">
        <div class="space-y-4">
            <input id="nama" type="text" placeholder="Nama Lengkap" class="w-full p-4 rounded-2xl outline-none font-semibold" required>
            <div class="grid grid-cols-2 gap-4">
                <input id="wa" type="number" placeholder="Nomor WA" class="w-full p-4 rounded-2xl outline-none font-semibold" required>
                <input id="tujuan" type="text" placeholder="No HP/ID Tujuan" class="w-full p-4 rounded-2xl outline-none font-semibold" required>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <select id="layanan" class="w-full p-4 rounded-2xl outline-none font-bold cursor-pointer" required>
              <option value="" disabled selected>Layanan</option>
              <option value="DANA">DANA</option>
              <option value="GoPay">GoPay</option>
              <option value="ShopeePay">ShopeePay</option>
              <option value="E-Toll">E-Toll</option>
              <option value="Pulsa">Pulsa</option>
              <option value="Token PLN">Token PLN</option>
            </select>
            <select id="nominal" class="w-full p-4 rounded-2xl outline-none font-bold cursor-pointer" required disabled>
              <option value="" disabled selected>Nominal</option>
            </select>
        </div>
        <button type="submit" id="btnKirim" class="w-full mt-6 bg-gradient-to-r from-purple-600 to-indigo-600 p-5 rounded-2xl font-black text-white tracking-widest uppercase">Kirim Pesanan</button>
      </form>
    </div>
  </main>

  <div id="paymentPopup" class="fixed inset-0 bg-black/95 backdrop-blur-2xl hidden items-center justify-center z-[100] p-6">
    <div class="bg-zinc-900 p-10 rounded-[3rem] text-center shadow-2xl max-w-sm w-full border border-white/5">
        
        <div id="qrisSection">
            <h2 class="text-2xl font-black text-white mb-2 uppercase">Bayar Sekarang</h2>
            <div class="bg-white p-4 rounded-[2rem] my-6">
                <img id="qrisImg" src="" alt="QRIS" class="w-full h-auto rounded-lg">
            </div>
            <div class="bg-purple-500/10 p-4 rounded-2xl mb-6 border border-purple-500/20">
                <p id="displayTotal" class="text-2xl font-black text-white italic">Rp 0</p>
            </div>
            <p class="text-gray-500 text-[10px] animate-pulse font-bold uppercase">Menunggu Verifikasi Admin...</p>
        </div>

        <div id="successSection" class="hidden">
            <div class="w-20 h-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl animate-bounce">
                <i class="fa-solid fa-check-double"></i>
            </div>
            <h2 class="text-2xl font-black text-white mb-2 uppercase">Sukses!</h2>
            <p class="text-gray-400 text-xs mb-6">Pesanan Anda berhasil diproses.</p>
            
            <div id="ratingBox" class="bg-white/5 p-5 rounded-2xl border border-white/10 mb-8">
                <p class="text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-3">Berikan Rating</p>
                <div class="flex justify-center gap-3 text-2xl text-gray-600 mb-2" id="starContainer">
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="1"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="2"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="3"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="4"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="5"></i>
                </div>
                <p id="ratingStatus" class="text-[9px] text-gray-500 italic">Puas dengan layanan kami?</p>
            </div>
            <button onclick="window.location.href='index.html'" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-sm">Kembali ke Beranda</button>
        </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
      authDomain: "uasbima-2c5d7.firebaseapp.com",
      projectId: "uasbima-2c5d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("orderForm");
    const btnKirim = document.getElementById("btnKirim");
    const selectLayanan = document.getElementById("layanan");
    const selectNominal = document.getElementById("nominal");
    let currentOrderId = null;

    const listNominalDefault = (nama) => [
        { label: `${nama} 10rb`, val: "10.000", hrg: "12.000" },
        { label: `${nama} 20rb`, val: "20.000", hrg: "22.000" },
        { label: `${nama} 50rb`, val: "50.000", hrg: "52.000" }
    ];

    const opsiHarga = {
      "DANA": listNominalDefault("DANA"),
      "GoPay": listNominalDefault("GoPay"),
      "ShopeePay": listNominalDefault("SPay"),
      "E-Toll": listNominalDefault("E-Toll"),
      "Pulsa": listNominalDefault("Pulsa"),
      "Token PLN": listNominalDefault("PLN")
    };

    selectLayanan.addEventListener("change", () => {
        selectNominal.innerHTML = '<option value="" disabled selected>Pilih Nominal</option>';
        selectNominal.disabled = false;
        if (opsiHarga[selectLayanan.value]) {
            opsiHarga[selectLayanan.value].forEach(item => {
                const option = document.createElement("option");
                option.value = `${item.val}|${item.hrg}`;
                option.textContent = `${item.label} (Rp ${item.hrg})`;
                selectNominal.appendChild(option);
            });
        }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btnKirim.disabled = true;
      btnKirim.innerHTML = "Processing...";

      const [nomVal, hargaVal] = selectNominal.value.split('|');
      const data = {
        // BAGIAN PREFIX ID PESANAN (MENGGANTI WOWO JADI BIMA)
        orderId: "BIMAZ-" + Math.floor(1000 + Math.random() * 9000),
        nama: document.getElementById("nama").value,
        wa: document.getElementById("wa").value,
        layanan: selectLayanan.value,
        nominal: nomVal,
        total_harga: hargaVal,
        tujuan: document.getElementById("tujuan").value,
        status: "Waiting Payment",
        rating: 0,
        createdAt: serverTimestamp()
      };

      try {
        const docRef = await addDoc(collection(db, "order"), data);
        currentOrderId = docRef.id;
        
        document.getElementById("qrisImg").src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://link.dana.id/qr/083148583173";
        document.getElementById("displayTotal").innerText = `Rp ${hargaVal}`;
        document.getElementById("paymentPopup").classList.replace("hidden", "flex");

        window.open(`https://wa.me/6283148583173?text=Halo%20Admin,%20Saya%20order%20${data.layanan}%20${data.nominal}%20dengan%20ID%20${data.orderId}.%20Mohon%20proses%20setelah%20pembayaran.`, '_blank');

        onSnapshot(doc(db, "order", currentOrderId), (snap) => {
            if (snap.exists() && snap.data().status === "Success") {
                document.getElementById("qrisSection").classList.add("hidden");
                document.getElementById("successSection").classList.remove("hidden");
            }
        });

      } catch (err) { alert("Terjadi kesalahan!"); btnKirim.disabled = false; }
    });

    const stars = document.querySelectorAll("#starContainer i");
    stars.forEach(star => {
        star.addEventListener("click", async () => {
            const ratingValue = parseInt(star.getAttribute("data-rating"));
            
            stars.forEach(s => {
                const sVal = parseInt(s.getAttribute("data-rating"));
                sVal <= ratingValue ? s.classList.add("star-active") : s.classList.remove("star-active");
            });

            try {
                const orderRef = doc(db, "order", currentOrderId);
                await updateDoc(orderRef, { 
                    rating: ratingValue,
                    status: "Success" 
                });
                document.getElementById("ratingStatus").innerText = "Terima kasih! Rating telah terkirim.";
                document.getElementById("starContainer").style.pointerEvents = "none";
            } catch (e) { 
                console.error("Error rating:", e); 
            }
        });
    });
  </script>
</body>
</html>
