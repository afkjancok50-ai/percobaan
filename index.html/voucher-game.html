<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher Game - NEXTGEN</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F3F4F6;
            color: #1e1b7e;
        }
        .card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .input {
            width: 100%;
            border: 2px solid #e5e7eb;
            border-radius: 1rem;
            padding: 14px;
            outline: none;
            transition: 0.2s;
        }
        .input:focus {
            border-color: #1e1b7e;
        }
        .nominal-btn {
            padding: 12px;
            border-radius: 1rem;
            border: 2px solid #e5e7eb;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }
        .nominal-btn:hover {
            border-color: #1e1b7e;
        }
        .nominal-btn.active {
            background: #1e1b7e;
            color: white;
            border-color: #1e1b7e;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md">

    <!-- LOGO -->
    <div class="text-center mb-6">
        <img src="NEXTGENLOGO.png" class="h-20 mx-auto">
    </div>

    <!-- CARD -->
    <div class="card p-6 space-y-5">

        <h2 class="text-xl font-black text-center">Voucher Game</h2>

        <form action="order.html" method="GET" onsubmit="return validateForm()">

            <!-- PILIH GAME -->
            <div class="mb-4">
                <label class="text-sm font-bold text-gray-500">Pilih Game</label>
                <select name="wallet" class="input" required>
                    <option value="">-- Pilih Game --</option>
                    <option value="MOBILE LEGENDS">Mobile Legends</option>
                    <option value="FREE FIRE">Free Fire</option>
                    <option value="PUBG MOBILE">PUBG Mobile</option>
                    <option value="GENSHIN IMPACT">Genshin Impact</option>
                </select>
            </div>

            <!-- ID GAME -->
            <div class="mb-4">
                <label class="text-sm font-bold text-gray-500">User ID / Server</label>
                <input type="text" name="phone" required class="input" placeholder="Contoh: 12345678(1234)">
            </div>

            <!-- NOMINAL -->
            <div class="mb-4">
                <label class="text-sm font-bold text-gray-500">Pilih Nominal</label>

                <div class="grid grid-cols-3 gap-3 mt-2">
                    <div class="nominal-btn" onclick="selectNominal(this, '10.000')">10K</div>
                    <div class="nominal-btn" onclick="selectNominal(this, '20.000')">20K</div>
                    <div class="nominal-btn" onclick="selectNominal(this, '50.000')">50K</div>
                    <div class="nominal-btn" onclick="selectNominal(this, '100.000')">100K</div>
                    <div class="nominal-btn" onclick="selectNominal(this, '200.000')">200K</div>
                    <div class="nominal-btn" onclick="selectNominal(this, '500.000')">500K</div>
                </div>
            </div>

            <!-- HIDDEN NOMINAL -->
            <input type="hidden" name="nominal" id="nominalInput">

            <!-- BUTTON -->
            <button type="submit"
                class="w-full bg-[#1e1b7e] text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all mt-4">
                Lanjut ke Pembayaran
            </button>

        </form>

        <!-- BACK -->
        <a href="top up.html"
            class="block text-center w-full border-2 border-[#1e1b7e] text-[#1e1b7e] py-3 rounded-2xl font-bold uppercase text-sm hover:bg-[#1e1b7e] hover:text-white transition-all">
            Kembali ke Layanan
        </a>

    </div>

</div>

<script>
    function selectNominal(el, value) {
        document.querySelectorAll('.nominal-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('nominalInput').value = value;
    }

    function validateForm() {
        const nominal = document.getElementById('nominalInput').value;
        if (!nominal) {
            alert("Pilih nominal terlebih dahulu!");
            return false;
        }
        return true;
    }
</script>

</body>
</html>
