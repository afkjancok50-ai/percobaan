<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up E-Wallet - NEXTGEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F9FD; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .wallet-radio:checked + .wallet-content { border-color: #f37021; background-color: #fffaf7; box-shadow: 0 10px 20px rgba(243, 112, 33, 0.1); }
        .wallet-radio:checked + .wallet-content .check-icon { display: block; }
        .wallet-logo-container { height: 40px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

    <nav class="relative z-50 flex items-center justify-between px-10 md:px-20 py-4 bg-white shadow-sm">
        <div class="flex items-center">
            <img src="NEXTGENLOGO.png" alt="NextGen Logo" class="h-16 w-auto object-contain">
        </div>
        <div class="hidden md:flex space-x-10 items-center font-bold text-xs text-[#1e1b7e]">
            <a href="top up.html" class="hover:text-[#f37021] uppercase transition">Kembali Ke Layanan</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="flex-1">
                <div class="glass-card p-8 rounded-3xl shadow-xl">
                    <h2 class="text-2xl font-black text-[#1e1b7e] mb-2 uppercase">Top Up E-Wallet</h2>
                    <p class="text-gray-500 mb-8 text-sm">Pilih layanan dan masukkan nomor handphone tujuan.</p>

                    <div class="mb-8">
                        <label class="block text-[#1e1b7e] font-bold mb-4 text-sm">1. PILIH LAYANAN</label>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <label class="cursor-pointer relative">
                                <input type="radio" name="wallet" value="DANA" class="wallet-radio hidden" checked>
                                <div class="wallet-content border-2 border-transparent p-4 rounded-2xl transition-all text-center bg-white shadow-sm hover:border-orange-200">
                                    <div class="wallet-logo-container"><img src="dana.png" alt="Dana" class="h-full w-full object-contain"></div>
                                    <span class="text-[10px] font-black text-gray-700 uppercase">DANA</span>
                                    <i class="fas fa-check-circle check-icon absolute top-2 right-2 text-[#f37021] hidden"></i>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="wallet" value="OVO" class="wallet-radio hidden">
                                <div class="wallet-content border-2 border-transparent p-4 rounded-2xl transition-all text-center bg-white shadow-sm hover:border-orange-200">
                                    <div class="wallet-logo-container"><img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/Logo_ovo_purple.svg" alt="OVO" class="h-full w-full object-contain"></div>
                                    <span class="text-[10px] font-black text-gray-700 uppercase">OVO</span>
                                    <i class="fas fa-check-circle check-icon absolute top-2 right-2 text-[#f37021] hidden"></i>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="wallet" value="GOPAY" class="wallet-radio hidden">
                                <div class="wallet-content border-2 border-transparent p-4 rounded-2xl transition-all text-center bg-white shadow-sm hover:border-orange-200">
                                    <div class="wallet-logo-container"><img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" alt="GoPay" class="h-full w-full object-contain"></div>
                                    <span class="text-[10px] font-black text-gray-700 uppercase">GOPAY</span>
                                    <i class="fas fa-check-circle check-icon absolute top-2 right-2 text-[#f37021] hidden"></i>
                                </div>
                            </label>
                            <label class="cursor-pointer relative">
                                <input type="radio" name="wallet" value="SHOPEE" class="wallet-radio hidden">
                                <div class="wallet-content border-2 border-transparent p-4 rounded-2xl transition-all text-center bg-white shadow-sm hover:border-orange-200">
                                    <div class="wallet-logo-container"><img src="shopepay.png" alt="ShopeePay" class="h-full w-full object-contain"></div>
                                    <span class="text-[10px] font-black text-gray-700 uppercase">SHOPEE</span>
                                    <i class="fas fa-check-circle check-icon absolute top-2 right-2 text-[#f37021] hidden"></i>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="mb-8">
                        <label class="block text-[#1e1b7e] font-bold mb-2 text-sm uppercase">2. Nomor Tujuan</label>
                        <input id="phoneInput" type="number" placeholder="Masukkan nomor HP (0812...)" class="w-full px-6 py-4 rounded-xl border-2 border-gray-100 focus:border-[#f37021] focus:outline-none transition font-medium">
                    </div>

                    <div class="mb-8">
                        <label class="block text-[#1e1b7e] font-bold mb-4 text-sm uppercase">3. Pilih Nominal</label>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <button onclick="setNominal('50.000', this)" class="nom-btn py-4 border-2 border-gray-100 rounded-xl font-bold text-[#1e1b7e] hover:border-[#f37021] transition">Rp 50.000</button>
                            <button onclick="setNominal('100.000', this)" class="nom-btn py-4 border-2 border-gray-100 rounded-xl font-bold text-[#1e1b7e] hover:border-[#f37021] transition">Rp 100.000</button>
                            <button onclick="setNominal('200.000', this)" class="nom-btn py-4 border-2 border-gray-100 rounded-xl font-bold text-[#1e1b7e] hover:border-[#f37021] transition">Rp 200.000</button>
                            <button onclick="setNominal('300.000', this)" class="nom-btn py-4 border-2 border-gray-100 rounded-xl font-bold text-[#1e1b7e] hover:border-[#f37021] transition">Rp 300.000</button>
                            <button onclick="setNominal('500.000', this)" class="nom-btn py-4 border-2 border-gray-100 rounded-xl font-bold text-[#1e1b7e] hover:border-[#f37021] transition">Rp 500.000</button>
                            <button onclick="setNominal('1.000.000', this)" class="nom-btn py-4 border-2 border-gray-100 rounded-xl font-bold text-[#1e1b7e] hover:border-[#f37021] transition">Rp 1.000.000</button>
                        </div>
                    </div>

                    <button onclick="orderNow()" class="w-full bg-[#1e1b7e] text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg hover:bg-blue-900 transition-all transform active:scale-95">KONFIRMASI TOP UP</button>
                </div>
            </div>

            <div class="w-full md:w-80">
                <div class="bg-[#1e1b7e] p-6 rounded-3xl text-white shadow-xl">
                    <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fas fa-info-circle text-[#f37021]"></i> INFO</h3>
                    <p class="text-xs opacity-80 leading-relaxed">Pastikan nomor benar. Saldo masuk otomatis dalam 1-5 menit setelah pembayaran diverifikasi.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let selectedNominal = "";
        function setNominal(val, btn) {
            selectedNominal = val;
            document.querySelectorAll('.nom-btn').forEach(b => b.classList.remove('bg-orange-50', 'border-[#f37021]'));
            btn.classList.add('bg-orange-50', 'border-[#f37021]');
        }
        function orderNow() {
            const phone = document.getElementById('phoneInput').value;
            const wallet = document.querySelector('input[name="wallet"]:checked').value;
            if(!phone || !selectedNominal) return alert("Lengkapi data!");
            window.location.href = `order.html?phone=${phone}&nominal=${selectedNominal}&wallet=${wallet}`;
        }
    </script>
</body>
</html>
