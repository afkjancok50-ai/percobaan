  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
      authDomain: "uasbima-2c5d7.firebaseapp.com",
      projectId: "uasbima-2c5d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const testiContainer = document.getElementById("testiContainer");

    const q = query(collection(db, "order"), where("status", "==", "Success"), where("rating", ">", 0), orderBy("rating", "desc"), limit(6));

    onSnapshot(q, (snapshot) => {
      testiContainer.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        let stars = "";
        for (let i = 1; i <= 5; i++) stars += `<i class="fa-solid fa-star ${i <= data.rating ? 'star-gold' : 'text-gray-200'} text-[8px]"></i>`;
        testiContainer.innerHTML += `
          <div class="testi-card text-left">
            <div class="flex justify-between items-center mb-1">
              <h4 class="font-black text-gray-800 text-[9px] uppercase">${data.nama ? data.nama.substring(0,2)+'***' : 'User'}</h4>
              <div class="flex gap-0.5">${stars}</div>
            </div>
            <p class="text-[7px] text-blue-500 font-bold uppercase">${data.layanan || ''}</p>
          </div>
        `;
      });
    });
