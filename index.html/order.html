<script>
    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone');
    const nominal = params.get('nominal');
    const wallet = params.get('wallet');

    let globalTotal = "";
    let orderIdGlobal = "";

    if(phone && nominal && wallet){

        orderIdGlobal = "NG-" + Math.floor(Math.random() * 1000000);

        document.getElementById('orderId').innerText = orderIdGlobal;
        document.getElementById('resWallet').innerText = wallet + " TOP UP";
        document.getElementById('resPhone').innerText = phone;
        document.getElementById('resNominal').innerText = "Rp " + nominal;

        const adminFee = 2000;
        const total = parseInt(nominal.replace(/\./g,'')) + adminFee;

        globalTotal = total.toLocaleString('id-ID');

        document.getElementById('resTotal').innerText = "Rp " + globalTotal;
        document.getElementById('resTotalModal').innerText = "Rp " + globalTotal;

        // QR langsung ke nomor DANA kamu
        document.getElementById('qrImage').src =
            `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=083148583173`;

    } else {
        window.location.href = "topup.html";
    }

    // 🔥 LANGSUNG TAMPILKAN QR TANPA LAG
    function showQRCode(){
        const modal = document.getElementById('qrModal');
        modal.classList.remove('hidden');
        modal.classList.add('active');
    }

    function closeModal(){
        const modal = document.getElementById('qrModal');
        modal.classList.add('hidden');
        modal.classList.remove('active');
    }

    function sendWhatsApp(){

        const message =
            `Halo Admin NextGen,%0A%0A` +
            `Saya sudah melakukan pembayaran dengan detail:%0A%0A` +
            `🧾 ID Order: ${orderIdGlobal}%0A` +
            `📦 Layanan: ${wallet}%0A` +
            `📱 Nomor Tujuan: ${phone}%0A` +
            `💰 Total Bayar: Rp ${globalTotal}%0A%0A` +
            `Mohon diproses ya.%0A%0A` +
            `Saya akan kirim *bukti transfer yang jelas* (tidak blur & lengkap).`;

        window.open(`https://wa.me/6283148583173?text=${message}`, '_blank');
    }

    // AUTO OPEN QR SAAT KLIK BAYAR
    document.querySelector("button[onclick='showQRCode()']")
        .addEventListener("click", showQRCode);
</script>
