<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order WOWO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white flex items-center justify-center min-h-screen">

<div class="bg-gray-900/80 backdrop-blur-lg shadow-2xl p-6 rounded-2xl w-full max-w-lg border border-white/10">
  <h2 class="text-2xl font-bold text-center mb-6 text-purple-400">🚀 Form Order WOWO</h2>
  
  <form id="orderForm" class="grid grid-cols-2 gap-4">
    <input id="nama" type="text" placeholder="Nama Anda" class="col-span-2 p-3 rounded bg-gray-800 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5" required>
    <input id="wa" type="number" placeholder="No WA (08xx)" class="p-3 rounded bg-gray-800 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5" required>
    <input id="tujuan" type="number" placeholder="No HP Tujuan / DANA" class="p-3 rounded bg-gray-800 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5" required>

    <select id="layanan" class="p-3 rounded bg-gray-800 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5 text-gray-300" required>
      <option value="" disabled selected>Pilih Layanan</option>
      <option value="DANA">Top Up DANA</option>
      <option value="Pulsa">Pulsa All Operator</option>
      <option value="Kuota">Kuota Internet</option>
      <option value="Token PLN">Token PLN</option>
    </select>

    <select id="nominal" class="p-3 rounded bg-gray-800 focus:ring-2 focus:ring-purple-500 outline-none border border-white/5 text-gray-300" required>
      <option value="" disabled selected>Pilih Nominal</option>
    </select>
    
    <button type="submit" id="btnKirim" class="col-span-2 mt-2 bg-gradient-to-r from-purple-600 to-purple-800 p-3 rounded-xl font-semibold hover:scale-105 transition disabled:opacity-50">
      Kirim Order
    </button>
  </form>
</div>

<div id="successPopup" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden items-center justify-center z-50">
  <div class="bg-gray-900 p-8 rounded-3xl text-center shadow-2xl max-w-sm w-full border border-purple-500/30">
    <div class="text-green-400 text-6xl mb-4"><i class="fa-solid fa-circle-check"></i></div>
    <h2 class="text-2xl font-bold mb-2">Order Berhasil!</h2>
    <p class="text-gray-400 mb-6">Data tersimpan & Notif dikirim ke WA.</p>
    <button onclick="closePopup()" class="bg-purple-600 px-6 py-3 rounded-xl hover:bg-purple-700 transition">Tutup</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
  authDomain: "uasbima-2c5d7.firebaseapp.com",
  projectId: "uasbima-2c5d7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("orderForm");
const btnKirim = document.getElementById("btnKirim");
const selectLayanan = document.getElementById("layanan");
const selectNominal = document.getElementById("nominal");

// Data Nominal dengan Keuntungan +2rb
const opsiHarga = {
  "DANA": [
    { label: "DANA 10.000 (Harga: Rp 12.000)", val: "10.000" },
    { label: "DANA 20.000 (Harga: Rp 22.000)", val: "20.000" },
    { label: "DANA 50.000 (Harga: Rp 52.000)", val: "50.000" },
    { label: "DANA 100.000 (Harga: Rp 102.000)", val: "100.000" },
    { label: "DANA 200.000 (Harga: Rp 202.000)", val: "200.000" },
    { label: "DANA 500.000 (Harga: Rp 502.000)", val: "500.000" },
    { label: "DANA 1.000.000 (Harga: Rp 1.002.000)", val: "1.000.000" }
  ],
  "Pulsa": [
    { label: "5.000 (Rp 6.200)", val: "5.000" },
    { label: "10.000 (Rp 11.150)", val: "10.000" },
    { label: "20.000 (Rp 20.800)", val: "20.000" }
  ],
  "Kuota": [
    { label: "1 GB (Rp 12.000)", val: "1 GB" },
    { label: "5 GB (Rp 35.000)", val: "5 GB" }
  ],
  "Token PLN": [
    { label: "20.000 (Rp 21.500)", val: "20.000" },
    { label: "50.000 (Rp 51.500)", val: "50.000" }
  ]
};

selectLayanan.addEventListener("change", () => {
  const pilihan = selectLayanan.value;
  selectNominal.innerHTML = '<option value="" disabled selected>Pilih Nominal</option>';
  
  if (opsiHarga[pilihan]) {
    opsiHarga[pilihan].forEach(item => {
      const option = document.createElement("option");
      option.value = item.val;
      option.textContent = item.label;
      selectNominal.appendChild(option);
    });
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btnKirim.disabled = true;
  btnKirim.innerText = "Memproses...";

  const data = {
    orderId: "WOWO-" + Math.floor(Math.random() * 1000000),
    nama: document.getElementById("nama").value,
    wa_pelanggan: document.getElementById("wa").value,
    layanan: selectLayanan.value,
    nominal: selectNominal.value,
    tujuan: document.getElementById("tujuan").value,
    createdAt: serverTimestamp()
  };

  try {
    // Simpan ke Firebase koleksi 'order'
    await addDoc(collection(db, "order"), data);

    // Kirim ke WhatsApp Admin
    const nomorAdmin = "6283148583173"; 
    const pesanWA = `Halo Admin, ada pesanan baru!\n\n` +
                    `*ID Order:* ${data.orderId}\n` +
                    `*Nama:* ${data.nama}\n` +
                    `*WA Pelanggan:* ${data.wa_pelanggan}\n` +
                    `*Layanan:* ${data.layanan}\n` +
                    `*Nominal:* ${data.nominal}\n` +
                    `*Tujuan:* ${data.tujuan}`;
    
    window.open(`https://wa.me/${nomorAdmin}?text=${encodeURIComponent(pesanWA)}`, '_blank');

    document.getElementById("successPopup").classList.replace("hidden", "flex");
    form.reset();
  } catch (err) {
    alert("Gagal mengirim! Cek koneksi atau Rules Firebase.");
  } finally {
    btnKirim.disabled = false;
    btnKirim.innerText = "Kirim Order";
  }
});

window.closePopup = () => {
  document.getElementById("successPopup").classList.replace("flex", "hidden");
};
</script>
</body>
</html>
