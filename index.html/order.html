<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pesanan - NEXTGEN</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F3F4F6; }
        .receipt-shape { position: relative; background: white; border-radius: 2.5rem; }
        .receipt-shape::after {
            content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 20px;
            background-image: radial-gradient(circle, white 70%, transparent 75%);
            background-size: 20px 20px; background-position: 0 -10px;
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.26, 0.53, 0.74, 1.48); }
        @keyframes pop {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        #qrModal { display: none; }
        #qrModal.active { display: flex; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 text-[#1e1b7e]">

<div id="mainContent" class="w-full max-w-md animate-pop">

    <!-- LOGO -->
    <div class="text-center mb-8">
        <img src="NEXTGENLOGO.png" alt="Logo" class="h-14 mx-auto">
    </div>

    <!-- CARD -->
    <div class="receipt-shape shadow-2xl overflow-hidden">

        <div class="bg-[#1e1b7e] p-6 text-white text-center">
            <h2 class="text-xl font-black uppercase">Ringkasan Order</h2>
            <p id="orderId" class="text-[10px] opacity-60 tracking-[0.3em] mt-1 font-bold"></p>
        </div>

        <div class="p-8 space-y-6">

            <div>
                <p class="text-gray-400 text-[10px] font-bold uppercase">Layanan</p>
                <p id="resWallet" class="font-black text-xl">---</p>
            </div>

            <div>
                <p class="text-gray-400 text-[10px] font-bold uppercase">Nomor Tujuan</p>
                <p id="resPhone" class="font-black text-xl">---</p>
            </div>

            <hr class="border-dashed">

            <div class="space-y-3 text-sm font-semibold">
                <div class="flex justify-between">
                    <span class="text-gray-400">Nominal</span>
                    <span id="resNominal">Rp 0</span>
                </div>

                <div class="flex justify-between">
                    <span class="text-gray-400">Biaya Admin</span>
                    <span>Rp 2.000</span>
                </div>
            </div>

            <div class="bg-orange-50 p-5 rounded-[2rem] flex justify-between">
                <span class="font-bold text-gray-900">Total Bayar</span>
                <span id="resTotal" class="text-[#f37021] text-2xl font-black">Rp 0</span>
            </div>

            <button onclick="showQRCode()"
                class="w-full bg-[#1e1b7e] text-white py-5 rounded-2xl font-black shadow-lg">
                BAYAR SEKARANG
            </button>

            <button onclick="window.history.back()"
                class="w-full text-gray-400 font-bold text-xs uppercase">
                Kembali & Ubah
            </button>

        </div>
    </div>
</div>

<!-- MODAL QR -->
<div id="qrModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-6 hidden">

    <div class="bg-white w-full max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">

        <div class="bg-[#008CFF] p-6 text-white text-center">
            <h3 class="font-black text-sm uppercase">Pembayaran via Dana</h3>
        </div>

        <div class="p-8 text-center">

            <img id="qrImage" class="w-48 h-48 mx-auto mb-4">

            <p id="resTotalModal" class="font-black text-2xl mb-4">Rp 0</p>

            <button onclick="sendWhatsApp()"
                class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black mb-2">
                KONFIRMASI WA
            </button>

            <button onclick="closeModal()" class="text-gray-400 text-xs">
                Tutup
            </button>

        </div>
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone');
    const nominal = params.get('nominal');
    const wallet = params.get('wallet');

    let globalTotal = "";
    let orderIdGlobal = "";

    if(phone && nominal && wallet){

        orderIdGlobal = "NG-" + Math.floor(Math.random() * 1000000);

        document.getElementById('orderId').innerText = orderIdGlobal;
        document.getElementById('resWallet').innerText = wallet + " TOP UP";
        document.getElementById('resPhone').innerText = phone;
        document.getElementById('resNominal').innerText = "Rp " + nominal;

        const adminFee = 2000;
        const total = parseInt(nominal.replace(/\./g,'')) + adminFee;

        globalTotal = total.toLocaleString('id-ID');

        document.getElementById('resTotal').innerText = "Rp " + globalTotal;
        document.getElementById('resTotalModal').innerText = "Rp " + globalTotal;

        // 🔥 QR ke nomor kamu
        document.getElementById('qrImage').src =
            `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=083148583173`;

    } else {
        window.location.href = "topup.html";
    }

    // 🔥 FIX: tombol langsung munculin QR
    function showQRCode(){
        const modal = document.getElementById('qrModal');
        modal.classList.remove('hidden');
        modal.classList.add('active');
    }

    function closeModal(){
        const modal = document.getElementById('qrModal');
        modal.classList.add('hidden');
        modal.classList.remove('active');
    }

    function sendWhatsApp(){

        const message =
            `Halo Admin NextGen,%0A%0A` +
            `Saya sudah melakukan pembayaran:%0A%0A` +
            `🧾 ID Order: ${orderIdGlobal}%0A` +
            `📦 Layanan: ${wallet}%0A` +
            `📱 Nomor Tujuan: ${phone}%0A` +
            `💰 Total Transfer: Rp ${globalTotal}%0A%0A` +
            `Mohon Untuk Segera Di Proses.`;

        window.open(`https://wa.me/6283148583173?text=${message}`, '_blank');
    }
</script>

</body>
</html>
