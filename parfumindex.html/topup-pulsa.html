<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Pulsa - NEXTGEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F9FD; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .provider-badge { transition: all 0.3s ease; opacity: 0.2; filter: grayscale(1); }
        .provider-badge.active { opacity: 1; filter: grayscale(0); transform: scale(1.1); }
        
        /* Animasi saat tombol nominal dipilih */
        .selected-nom {
            background-color: #fffaf7 !important;
            border-color: #f37021 !important;
            box-shadow: 0 0 0 4px rgba(243, 112, 33, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="relative z-50 flex items-center justify-between px-10 md:px-20 py-4 bg-white shadow-sm">
        <div class="flex items-center">
            <img src="NEXTGENLOGO.png" alt="NextGen Logo" class="h-16 w-auto object-contain">
        </div>
        <div class="hidden md:flex space-x-10 items-center font-bold text-xs text-[#1e1b7e]">
            <a href="top up.html" class="hover:text-[#f37021] uppercase transition">Kembali Ke Layanan</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row gap-8">
            <div class="flex-1">
                <div class="glass-card p-8 rounded-[2.5rem] shadow-xl">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-black text-[#1e1b7e] uppercase tracking-tight">Beli Pulsa</h2>
                        <div id="providerIcon" class="flex gap-3">
                        </div>
                    </div>

                    <div class="mb-10">
                        <label class="block text-[#1e1b7e] font-bold mb-3 text-[10px] uppercase tracking-widest opacity-60">1. Nomor Tujuan</label>
                        <div class="relative">
                            <span class="absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-lg">+62</span>
                            <input id="phoneInput" type="number" oninput="detectProvider()" placeholder="812xxxxxx" class="w-full pl-16 pr-6 py-5 rounded-2xl border-2 border-gray-50 focus:border-[#f37021] focus:bg-white bg-gray-50/50 focus:outline-none transition-all font-bold text-xl tracking-widest">
                        </div>
                    </div>

                    <div class="mb-10">
                        <label class="block text-[#1e1b7e] font-bold mb-4 text-[10px] uppercase tracking-widest opacity-60">2. Pilih Nominal Pulsa</label>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            
                            <button onclick="setNominal('5.000', this)" class="nom-btn relative p-5 border-2 border-gray-100 rounded-3xl text-left hover:border-orange-200 transition-all bg-white group shadow-sm">
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">Pulsa Reguler</p>
                                <p class="font-black text-[#1e1b7e] text-xl mt-1">5.000</p>
                                <p class="text-[11px] text-[#f37021] mt-2 font-bold bg-orange-50 inline-block px-2 py-0.5 rounded-lg">Rp 6.500</p>
                                <i class="fas fa-check-circle absolute top-4 right-4 text-[#f37021] opacity-0 transition-opacity check-mark text-lg"></i>
                            </button>

                            <button onclick="setNominal('10.000', this)" class="nom-btn relative p-5 border-2 border-gray-100 rounded-3xl text-left hover:border-orange-200 transition-all bg-white group shadow-sm">
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">Pulsa Reguler</p>
                                <p class="font-black text-[#1e1b7e] text-xl mt-1">10.000</p>
                                <p class="text-[11px] text-[#f37021] mt-2 font-bold bg-orange-50 inline-block px-2 py-0.5 rounded-lg">Rp 11.500</p>
                                <i class="fas fa-check-circle absolute top-4 right-4 text-[#f37021] opacity-0 transition-opacity check-mark text-lg"></i>
                            </button>

                            <button onclick="setNominal('20.000', this)" class="nom-btn relative p-5 border-2 border-gray-100 rounded-3xl text-left hover:border-orange-200 transition-all bg-white group shadow-sm">
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">Pulsa Reguler</p>
                                <p class="font-black text-[#1e1b7e] text-xl mt-1">20.000</p>
                                <p class="text-[11px] text-[#f37021] mt-2 font-bold bg-orange-50 inline-block px-2 py-0.5 rounded-lg">Rp 21.500</p>
                                <i class="fas fa-check-circle absolute top-4 right-4 text-[#f37021] opacity-0 transition-opacity check-mark text-lg"></i>
                            </button>

                            <button onclick="setNominal('50.000', this)" class="nom-btn relative p-5 border-2 border-gray-100 rounded-3xl text-left hover:border-orange-200 transition-all bg-white group shadow-sm">
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">Pulsa Reguler</p>
                                <p class="font-black text-[#1e1b7e] text-xl mt-1">50.000</p>
                                <p class="text-[11px] text-[#f37021] mt-2 font-bold bg-orange-50 inline-block px-2 py-0.5 rounded-lg">Rp 51.500</p>
                                <i class="fas fa-check-circle absolute top-4 right-4 text-[#f37021] opacity-0 transition-opacity check-mark text-lg"></i>
                            </button>

                            <button onclick="setNominal('100.000', this)" class="nom-btn relative p-5 border-2 border-gray-100 rounded-3xl text-left hover:border-orange-200 transition-all bg-white group shadow-sm">
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">Pulsa Reguler</p>
                                <p class="font-black text-[#1e1b7e] text-xl mt-1">100.000</p>
                                <p class="text-[11px] text-[#f37021] mt-2 font-bold bg-orange-50 inline-block px-2 py-0.5 rounded-lg">Rp 101.500</p>
                                <i class="fas fa-check-circle absolute top-4 right-4 text-[#f37021] opacity-0 transition-opacity check-mark text-lg"></i>
                            </button>

                        </div>
                    </div>

                    <button onclick="processOrder()" class="w-full bg-[#1e1b7e] text-white py-6 rounded-3xl font-black uppercase tracking-[0.2em] shadow-xl hover:bg-blue-900 transition-all transform active:scale-95 flex items-center justify-center gap-3">
                        Lanjut Pembayaran <i class="fas fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="w-full md:w-80 space-y-6">
                <div class="bg-[#1e1b7e] p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                    <i class="fas fa-bolt absolute -right-4 -bottom-4 text-white/5 text-8xl"></i>
                    <h3 class="font-bold mb-4 uppercase text-xs tracking-widest text-orange-400">Keunggulan</h3>
                    <ul class="text-xs space-y-4 font-medium opacity-90">
                        <li class="flex items-center gap-3"><i class="fas fa-check text-orange-400"></i> Proses Kilat 1 Menit</li>
                        <li class="flex items-center gap-3"><i class="fas fa-check text-orange-400"></i> CS 24 Jam Nonstop</li>
                        <li class="flex items-center gap-3"><i class="fas fa-check text-orange-400"></i> Harga Paling Murah</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script>
        let selectedNominal = "";
        let currentProvider = "PULSA REGULER";

        function detectProvider() {
            const phone = document.getElementById('phoneInput').value;
            const badges = document.querySelectorAll('.provider-badge');
            badges.forEach(b => b.classList.remove('active'));

            if (phone.startsWith('811') || phone.startsWith('812') || phone.startsWith('813') || phone.startsWith('821') || phone.startsWith('822')) {
                document.getElementById('telkomsel').classList.add('active');
                currentProvider = "TELKOMSEL";
            } else if (phone.startsWith('856') || phone.startsWith('857') || phone.startsWith('858')) {
                document.getElementById('indosat').classList.add('active');
                currentProvider = "INDOSAT";
            } else if (phone.startsWith('817') || phone.startsWith('818') || phone.startsWith('819') || phone.startsWith('859') || phone.startsWith('877') || phone.startsWith('878')) {
                document.getElementById('xl').classList.add('active');
                currentProvider = "XL AXIATA";
            }
        }

        function setNominal(val, btn) {
            selectedNominal = val;
            
            // Reset gaya semua tombol
            document.querySelectorAll('.nom-btn').forEach(b => {
                b.classList.remove('selected-nom');
                b.querySelector('.check-mark').classList.add('opacity-0');
            });

            // Terapkan gaya pada tombol terpilih
            btn.classList.add('selected-nom');
            btn.querySelector('.check-mark').classList.remove('opacity-0');
        }

        function processOrder() {
            const phone = document.getElementById('phoneInput').value;
            if(!phone || !selectedNominal) {
                alert("Lengkapi nomor HP dan pilih nominal!");
                return;
            }
            
            const fullPhone = "0" + phone;
            window.location.href = `order.html?phone=${fullPhone}&nominal=${selectedNominal}&wallet=${currentProvider}`;
        }
    </script>
</body>
</html>
