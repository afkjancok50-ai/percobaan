<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Game - NEXTGEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; 
            color: white;
        }
        .step-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            transition: all 0.4s ease;
        }
        .game-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .game-card.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-5px);
        }
        .nominal-item {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nominal-item:hover {
            border-color: #6366f1;
        }
        .nominal-item.active {
            background: #6366f1;
            border-color: #818cf8;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .step-number {
            background: #6366f1;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 800;
            font-size: 14px;
        }
        .game-icon {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 1rem;
            margin: 0 auto 0.5rem;
        }
        /* Animasi Muncul */
        .reveal { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-24">

<div class="max-w-md mx-auto px-4 pt-10">
    
    <div class="flex items-center justify-between mb-8">
        <a href="top up.html" class="text-gray-400 hover:text-white transition-colors">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <img src="NEXTGENLOGO.png" class="h-10" alt="Nextgen Logo">
        <div class="w-6"></div>
    </div>

    <form action="order.html" method="GET" onsubmit="return validateForm()">
        
        <div class="step-card p-5 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="step-number">1</div>
                <h3 class="font-bold text-slate-200">Pilih Game</h3>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="game-card p-2 rounded-2xl text-center cursor-pointer" onclick="selectGame(this, 'MLBB')">
                    <img src="ml.png" class="game-icon" alt="MLBB">
                    <p class="text-[10px] font-bold uppercase tracking-wider">MLBB</p>
                </div>
                <div class="game-card p-2 rounded-2xl text-center cursor-pointer" onclick="selectGame(this, 'FF')">
                    <img src="ff.png" class="game-icon" alt="Free Fire">
                    <p class="text-[10px] font-bold uppercase tracking-wider">Free Fire</p>
                </div>
                <div class="game-card p-2 rounded-2xl text-center cursor-pointer" onclick="selectGame(this, 'PUBG')">
                    <img src="pubg.png" class="game-icon" alt="PUBG">
                    <p class="text-[10px] font-bold uppercase tracking-wider">PUBG</p>
                </div>
            </div>
            <input type="hidden" name="wallet" id="gameInput" required>
        </div>

        <div id="stepData" class="step-card p-5 mb-6 hidden">
            <div class="flex items-center gap-3 mb-4">
                <div class="step-number">2</div>
                <h3 class="font-bold text-slate-200">Lengkapi Data</h3>
            </div>
            <div class="space-y-3">
                <input type="text" id="userIdInput" name="phone" oninput="checkDataFilled()" required 
                    class="w-full bg-[#1e293b] border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 transition-all font-bold text-sm text-white" 
                    placeholder="Masukkan User ID (Server)">
                <p class="text-[10px] text-slate-500 italic px-1">*Contoh: 12345678 (1234)</p>
            </div>
        </div>

        <div id="stepNominal" class="step-card p-5 mb-8 hidden">
            <div class="flex items-center gap-3 mb-4">
                <div class="step-number">3</div>
                <h3 class="font-bold text-slate-200">Pilih Nominal</h3>
            </div>
            <div id="nominalContainer" class="grid grid-cols-2 gap-3">
                </div>
            <input type="hidden" name="nominal" id="nominalInput">
        </div>

        <div id="footerBtn" class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 flex justify-center z-50 hidden">
            <button type="submit" class="w-full max-w-md bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
                Beli Sekarang
            </button>
        </div>

    </form>
</div>

<script>
    // Database Harga Pasar (Updateable)
    const priceDatabase = {
        'MLBB': [
            { label: '5 Diamonds', price: '1.500' },
            { label: '12 Diamonds', price: '3.500' },
            { label: '53 Diamonds', price: '14.500' },
            { label: '210 Diamonds', price: '57.000' },
            { label: 'Weekly Diamond Pass', price: '28.500' }
        ],
        'FF': [
            { label: '50 Diamonds', price: '7.500' },
            { label: '140 Diamonds', price: '19.000' },
            { label: '355 Diamonds', price: '47.500' },
            { label: '720 Diamonds', price: '94.000' },
            { label: 'Membership Mingguan', price: '29.000' }
        ],
        'PUBG': [
            { label: '30 Unknown Cash', price: '7.000' },
            { label: '60 Unknown Cash', price: '13.500' },
            { label: '325 Unknown Cash', price: '68.000' },
            { label: '660 Unknown Cash', price: '135.000' }
        ]
    };

    function selectGame(el, gameName) {
        // Reset Active State
        document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        
        // Simpan Pilihan
        document.getElementById('gameInput').value = gameName;
        
        // Munculkan Step 2
        const stepData = document.getElementById('stepData');
        stepData.classList.remove('hidden');
        stepData.classList.add('reveal');
        
        // Update Nominal List sesuai Game
        updateNominalList(gameName);
        
        // Reset nominal jika ganti game
        document.getElementById('nominalInput').value = "";
        checkDataFilled();
    }

    function checkDataFilled() {
        const idValue = document.getElementById('userIdInput').value;
        const stepNominal = document.getElementById('stepNominal');
        
        if (idValue.length >= 3) {
            stepNominal.classList.remove('hidden');
            stepNominal.classList.add('reveal');
        } else {
            stepNominal.classList.add('hidden');
            document.getElementById('footerBtn').classList.add('hidden');
        }
    }

    function updateNominalList(game) {
        const container = document.getElementById('nominalContainer');
        container.innerHTML = ""; // Bersihkan list lama
        
        const items = priceDatabase[game] || [];
        
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = "nominal-item p-4 rounded-xl";
            div.onclick = function() { setNominal(this, item.price); };
            div.innerHTML = `
                <div class="text-indigo-400 mb-1"><i class="fas fa-bolt text-xs"></i></div>
                <p class="font-bold text-[13px] leading-tight">${item.label}</p>
                <p class="text-[11px] text-slate-400 mt-1">Rp ${item.price}</p>
            `;
            container.appendChild(div);
        });
    }

    function setNominal(el, price) {
        document.querySelectorAll('.nominal-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('nominalInput').value = price;
        
        // Tampilkan tombol Beli
        const footerBtn = document.getElementById('footerBtn');
        footerBtn.classList.remove('hidden');
        footerBtn.classList.add('reveal');
    }

    function validateForm() {
        const game = document.getElementById('gameInput').value;
        const id = document.getElementById('userIdInput').value;
        const nominal = document.getElementById('nominalInput').value;
        
        if (!game || !id || !nominal) { 
            alert("Harap lengkapi semua data sebelum membeli!"); 
            return false; 
        }
        return true;
    }
</script>

</body>
</html>
