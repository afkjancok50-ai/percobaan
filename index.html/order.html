<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfirmasi Pesanan - WOWO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #050505; 
      background-image: radial-gradient(circle at 50% -20%, rgba(147, 51, 234, 0.1) 0%, rgba(0, 0, 0, 0) 50%);
    }
    
    .glass-nav {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .order-card {
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    input, select {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      border-color: rgba(168, 85, 247, 0.5) !important;
      background: rgba(168, 85, 247, 0.05) !important;
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
    }

    select option { background: #121212; color: white; }
  </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col">

  <nav class="fixed top-0 w-full glass-nav z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="p-1 bg-gray-800 rounded-lg group-hover:bg-purple-600 transition-colors">
            <i class="fa-solid fa-arrow-left text-white text-xs p-1"></i>
        </div>
        <h1 class="text-xl font-black tracking-tighter text-white">WOWO<span class="text-purple-500">.</span></h1>
      </a>
      <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Secure Checkout</span>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center p-6 pt-24 pb-12">
    <div class="order-card p-8 md:p-10 rounded-[2.5rem] w-full max-w-lg relative overflow-hidden">
      <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-600/10 blur-[80px]"></div>

      <div class="text-center mb-10">
        <h2 class="text-3xl font-black text-white tracking-tight">Konfirmasi <span class="text-purple-500">Order</span></h2>
        <p class="text-gray-500 text-sm mt-2 font-medium">Lengkapi data untuk memproses pesanan Anda.</p>
      </div>

      <form id="orderForm" class="space-y-5">
        <div class="space-y-4">
            <div class="relative">
                <i class="fa-solid fa-user absolute left-5 top-5 text-gray-600 text-sm"></i>
                <input id="nama" type="text" placeholder="Nama Lengkap" class="w-full pl-12 p-4 rounded-2xl outline-none text-white font-semibold" required>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <i class="fa-brands fa-whatsapp absolute left-5 top-5 text-gray-600 text-sm"></i>
                    <input id="wa" type="number" placeholder="No. WhatsApp" class="w-full pl-12 p-4 rounded-2xl outline-none text-white font-semibold" required>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-id-card absolute left-5 top-5 text-gray-600 text-sm"></i>
                    <input id="tujuan" type="number" placeholder="No HP Tujuan" class="w-full pl-12 p-4 rounded-2xl outline-none text-white font-semibold" required>
                </div>
            </div>
        </div>

        <div class="h-px bg-white/5 my-6"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">Layanan</label>
                <select id="layanan" class="w-full p-4 rounded-2xl outline-none text-white font-bold cursor-pointer" required>
                  <option value="" disabled selected>Pilih</option>
                  <option value="DANA">DANA</option>
                  <option value="GoPay">GoPay</option>
                  <option value="Pulsa">Pulsa</option>
                  <option value="Kuota">Kuota</option>
                  <option value="Token PLN">Token PLN</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-widest">Nominal</label>
                <select id="nominal" class="w-full p-4 rounded-2xl outline-none text-white font-bold cursor-pointer" required disabled>
                  <option value="" disabled selected>Pilih</option>
                </select>
            </div>
        </div>
        
        <button type="submit" id="btnKirim" class="w-full mt-6 bg-gradient-to-r from-purple-600 to-indigo-600 p-5 rounded-2xl font-black text-white hover:shadow-[0_0_30px_rgba(147,51,234,0.3)] active:scale-[0.98] transition-all disabled:opacity-50 tracking-widest uppercase text-sm">
          Konfirmasi & Bayar
        </button>
      </form>
    </div>
  </main>

  <div id="successPopup" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden items-center justify-center z-[100] p-6">
    <div class="bg-zinc-900 p-10 rounded-[3rem] text-center shadow-2xl max-w-sm w-full border border-white/5 transform transition-all">
      <div class="w-24 h-24 bg-green-500/10 text-green-400 rounded-full flex items-center justify-center mx-auto mb-8 text-5xl">
          <i class="fa-solid fa-check"></i>
      </div>
      <h2 class="text-3xl font-black text-white mb-3 tracking-tight">Berhasil!</h2>
      <p class="text-gray-500 mb-10 leading-relaxed font-medium">Data pesanan sudah masuk. Klik tombol di bawah untuk lanjut ke WhatsApp.</p>
      <button onclick="closePopup()" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-purple-500 hover:text-white transition-all tracking-widest uppercase text-xs">Selesai</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
      authDomain: "uasbima-2c5d7.firebaseapp.com",
      projectId: "uasbima-2c5d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("orderForm");
    const btnKirim = document.getElementById("btnKirim");
    const selectLayanan = document.getElementById("layanan");
    const selectNominal = document.getElementById("nominal");

    const opsiHarga = {
      "DANA": [
        { label: "10.000 (Rp 12k)", val: "10.000", hrg: "12.000" },
        { label: "100.000 (Rp 102k)", val: "100.000", hrg: "102.000" },
        { label: "500.000 (Rp 502k)", val: "500.000", hrg: "502.000" },
        { label: "1.000.000 (Rp 1.002k)", val: "1.000.000", hrg: "1.002.000" }
      ],
      "GoPay": [
        { label: "10k (Rp 12.000)", val: "10.000", hrg: "12.000" },
        { label: "20k (Rp 22.000)", val: "20.000", hrg: "22.000" }
      ],
      "Pulsa": [
        { label: "5.000 (Rp 7k)", val: "5.000", hrg: "7.000" },
        { label: "10.000 (Rp 12k)", val: "10.000", hrg: "12.000" },
        { label: "50.000 (Rp 52k)", val: "50.000", hrg: "52.000" },
        { label: "1.000.000 (Rp 1.002k)", val: "1.000.000", hrg: "1.002.000" }
      ],
      "Kuota": [
        { label: "1 GB (Rp 12k)", val: "1 GB", hrg: "12.000" },
        { label: "5 GB (Rp 37k)", val: "5 GB", hrg: "37.000" },
        { label: "10 GB (Rp 64k)", val: "10 GB", hrg: "64.000" }
      ],
      "Token PLN": [
        { label: "20k (Rp 22k)", val: "20.000", hrg: "22.000" },
        { label: "100k (Rp 102k)", val: "100.000", hrg: "102.000" },
        { label: "500k (Rp 502k)", val: "500.000", hrg: "502.000" },
        { label: "1jt (Rp 1.002k)", val: "1.000.000", hrg: "1.002.000" }
      ]
    };

    // Fungsi isi nominal
    const updateNominal = (layanan) => {
        selectNominal.innerHTML = '<option value="" disabled selected>Pilih</option>';
        selectNominal.disabled = false;
        if (opsiHarga[layanan]) {
            opsiHarga[layanan].forEach(item => {
                const option = document.createElement("option");
                option.value = `${item.val}|${item.hrg}`;
                option.textContent = item.label;
                selectNominal.appendChild(option);
            });
        }
    };

    selectLayanan.addEventListener("change", () => updateNominal(selectLayanan.value));

    // Tangkap data dari URL (Auto-fill)
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const prod = params.get('prod');
        if(prod) {
            // Logika pencocokan URL parameter ke select
            if(prod.includes("DANA")) selectLayanan.value = "DANA";
            else if(prod.includes("GoPay")) selectLayanan.value = "GoPay";
            else if(prod.includes("Pulsa")) selectLayanan.value = "Pulsa";
            else if(prod.includes("Data")) selectLayanan.value = "Kuota";
            else if(prod.includes("Token")) selectLayanan.value = "Token PLN";
            
            updateNominal(selectLayanan.value);
        }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btnKirim.disabled = true;
      btnKirim.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-3"></i> Memproses...';

      const [nomVal, hargaVal] = selectNominal.value.split('|');
      
      const data = {
        orderId: "WOWO-" + Math.floor(100000 + Math.random() * 900000),
        nama: document.getElementById("nama").value,
        wa: document.getElementById("wa").value,
        layanan: selectLayanan.value,
        nominal: nomVal,
        total_harga: hargaVal,
        tujuan: document.getElementById("tujuan").value,
        status: "Pending",
        createdAt: serverTimestamp()
      };

      try {
        await addDoc(collection(db, "order"), data);
        const nomorAdmin = "6283148583173"; 
        const pesanWA = `*ORDER BARU - WOWO STORE*\n` +
                        `━━━━━━━━━━━━━━━━\n` +
                        `*ID Order :* ${data.orderId}\n` +
                        `*Nama :* ${data.nama}\n` +
                        `*Layanan :* ${data.layanan}\n` +
                        `*Nominal :* ${data.nominal}\n` +
                        `*Tujuan :* ${data.tujuan}\n` +
                        `*Total Bayar :* Rp ${data.total_harga}\n` +
                        `━━━━━━━━━━━━━━━━\n` +
                        `_Mohon segera diproses!_`;
        
        window.open(`https://wa.me/${nomorAdmin}?text=${encodeURIComponent(pesanWA)}`, '_blank');
        document.getElementById("successPopup").classList.replace("hidden", "flex");
        form.reset();
      } catch (err) {
        alert("Gagal mengirim! Periksa koneksi.");
      } finally {
        btnKirim.disabled = false;
        btnKirim.innerText = "Konfirmasi & Bayar";
      }
    });

    window.closePopup = () => {
      document.getElementById("successPopup").classList.replace("flex", "hidden");
      window.location.href = "index.html";
    };
  </script>
</body>
</html>
