<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - WOWO STORE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    :root { --brimo-blue: #00529C; --brimo-dark: #002D57; --brimo-light: #F4F7FA; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: var(--brimo-light);
      background-image: radial-gradient(circle at 50% 0%, #e0e7ff 0%, transparent 50%);
      min-height: screen;
    }

    /* Gradient Header ala BRImo */
    .nav-gradient { background: linear-gradient(to right, var(--brimo-dark), var(--brimo-blue)); }
    
    .checkout-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 82, 156, 0.15);
    }

    input, select {
      background: white !important;
      border: 1.5px solid #e2e8f0 !important;
      color: #1e293b;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      border-color: var(--brimo-blue) !important;
      box-shadow: 0 0 0 4px rgba(0, 82, 156, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brimo-blue) 0%, var(--brimo-dark) 100%);
    }

    .star-active { color: #fbbf24 !important; transform: scale(1.2); }
  </style>
</head>
<body class="pb-12">

  <nav class="fixed top-0 w-full nav-gradient z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="p-2 bg-white/10 rounded-xl hover:bg-white/20 transition">
          <i class="fa-solid fa-chevron-left text-white"></i>
        </div>
        <h1 class="text-xl font-black text-white uppercase tracking-tighter">WOWO<span class="text-orange-400">.</span></h1>
      </a>
      <span class="text-[10px] font-bold text-blue-100 uppercase tracking-widest bg-white/10 px-4 py-1.5 rounded-full border border-white/10">Checkout Aman</span>
    </div>
  </nav>

  <main class="pt-32 px-6 flex justify-center">
    <div class="checkout-card w-full max-w-lg p-8 md:p-10 relative overflow-hidden">
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl"></div>
      
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
          <i class="fa-solid fa-receipt"></i>
        </div>
        <h2 class="text-3xl font-black text-gray-900 tracking-tight uppercase">Konfirmasi</h2>
        <p class="text-gray-500 text-sm font-medium mt-1">Lengkapi data untuk memproses pesanan</p>
      </div>

      <form id="orderForm" class="space-y-5">
        <div class="space-y-4">
          <div class="relative">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-4 mb-1 block">Data Pembeli</label>
            <input id="nama" type="text" placeholder="Nama Lengkap" class="w-full p-4 rounded-2xl outline-none font-bold" required>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="wa" type="number" placeholder="Nomor WhatsApp" class="w-full p-4 rounded-2xl outline-none font-bold" required>
            <input id="tujuan" type="text" placeholder="No HP / ID Tujuan" class="w-full p-4 rounded-2xl outline-none font-bold" required>
          </div>
        </div>

        <div class="bg-gray-50 p-6 rounded-[2rem] border border-gray-100 space-y-4">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1 block">Detail Produk</label>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <select id="layanan" class="w-full p-4 rounded-2xl outline-none font-black cursor-pointer" required>
              <option value="" disabled selected>Pilih Layanan</option>
              <option value="DANA">DANA</option>
              <option value="GoPay">GoPay</option>
              <option value="ShopeePay">ShopeePay</option>
              <option value="E-Toll">E-Toll</option>
              <option value="Pulsa">Pulsa</option>
              <option value="Token PLN">Token PLN</option>
            </select>
            <select id="nominal" class="w-full p-4 rounded-2xl outline-none font-black cursor-pointer" required>
              <option value="" disabled selected>Pilih Nominal</option>
            </select>
          </div>
        </div>

        <button type="submit" id="btnKirim" class="btn-primary w-full p-5 rounded-2xl font-black text-white tracking-[0.2em] uppercase shadow-lg shadow-blue-900/20 transform active:scale-95 transition">
          Beli Sekarang
        </button>
      </form>
    </div>
  </main>

  <div id="paymentPopup" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl hidden items-center justify-center z-[100] p-6">
    <div class="bg-white p-8 rounded-[3rem] text-center shadow-2xl max-w-sm w-full border border-white/20">
        
        <div id="qrisSection">
            <h2 class="text-xl font-black text-gray-900 mb-2 uppercase tracking-tighter">Selesaikan Pembayaran</h2>
            <div class="bg-gray-100 p-4 rounded-[2rem] my-6 border-2 border-dashed border-gray-300">
                <img id="qrisImg" src="" alt="QRIS" class="w-full h-auto rounded-xl">
            </div>
            <div class="bg-blue-600 p-4 rounded-2xl mb-6">
                <p class="text-[10px] text-blue-200 font-bold uppercase mb-1">Total Tagihan</p>
                <p id="displayTotal" class="text-2xl font-black text-white italic">Rp 0</p>
            </div>
            <div class="flex items-center justify-center gap-2 text-[10px] text-gray-400 font-bold uppercase animate-pulse">
              <div class="w-2 h-2 bg-orange-400 rounded-full"></div>
              Menunggu Verifikasi Admin
            </div>
        </div>

        <div id="successSection" class="hidden animate-in fade-in zoom-in duration-300">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-900 mb-2 uppercase">Berhasil!</h2>
            <p class="text-gray-500 text-xs mb-8">Transaksi Anda telah diproses oleh Admin.</p>
            
            <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 mb-8">
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-3">Berikan Rating</p>
                <div class="flex justify-center gap-3 text-2xl text-gray-300 mb-2" id="starContainer">
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="1"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="2"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="3"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="4"></i>
                    <i class="fa-solid fa-star cursor-pointer transition-all" data-rating="5"></i>
                </div>
                <p id="ratingStatus" class="text-[9px] text-blue-400 font-bold italic uppercase">Seberapa puas anda?</p>
            </div>
            <button onclick="window.location.href='index.html'" class="w-full bg-gray-900 text-white font-black py-4 rounded-2xl uppercase text-sm tracking-widest">Selesai</button>
        </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
      authDomain: "uasbima-2c5d7.firebaseapp.com",
      projectId: "uasbima-2c5d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const selectLayanan = document.getElementById("layanan");
    const selectNominal = document.getElementById("nominal");
    let currentOrderId = null;

    const opsiHarga = {
      "DANA": [{l:"10rb",v:"10.000",h:"12.000"},{l:"20rb",v:"20.000",h:"22.000"},{l:"50rb",v:"50.000",h:"52.000"}],
      "GoPay": [{l:"10rb",v:"10.000",h:"12.000"},{l:"20rb",v:"20.000",h:"22.000"},{l:"50rb",v:"50.000",h:"52.000"}],
      "ShopeePay": [{l:"10rb",v:"10.000",h:"12.000"},{l:"20rb",v:"20.000",h:"22.000"},{l:"50rb",v:"50.000",h:"52.000"}],
      "E-Toll": [{l:"20rb",v:"20.000",h:"22.500"},{l:"50rb",v:"50.000",h:"52.500"}],
      "Pulsa": [{l:"10rb",v:"10.000",h:"12.000"},{l:"20rb",v:"20.000",h:"22.000"}],
      "Token PLN": [{l:"20rb",v:"20.000",h:"22.000"},{l:"50rb",v:"50.000",h:"52.000"}]
    };

    // FUNGSI AUTO-SELECT DARI URL
    function loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const prod = params.get('prod'); // Mengambil ?prod=DANA
        
        if (prod && opsiHarga[prod]) {
            selectLayanan.value = prod;
            updateNominal(prod);
        }
    }

    function updateNominal(layanan) {
        selectNominal.innerHTML = '<option value="" disabled selected>Pilih Nominal</option>';
        if (opsiHarga[layanan]) {
            opsiHarga[layanan].forEach(item => {
                const opt = document.createElement("option");
                opt.value = `${item.v}|${item.h}`;
                opt.textContent = `${layanan} ${item.l} (Rp ${item.h})`;
                selectNominal.appendChild(opt);
            });
        }
    }

    selectLayanan.addEventListener("change", (e) => updateNominal(e.target.value));

    // Jalankan auto-select saat halaman terbuka
    window.onload = loadFromUrl;

    // FORM SUBMIT & FIREBASE LOGIC
    document.getElementById("orderForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnKirim");
      btn.disabled = true; btn.innerHTML = "MEMPROSES...";

      const [v, h] = selectNominal.value.split('|');
      const data = {
        orderId: "WOWO-" + Math.floor(1000 + Math.random() * 9000),
        nama: document.getElementById("nama").value,
        wa: document.getElementById("wa").value,
        layanan: selectLayanan.value,
        nominal: v,
        total_harga: h,
        tujuan: document.getElementById("tujuan").value,
        status: "Waiting Payment",
        rating: 0,
        createdAt: serverTimestamp()
      };

      try {
        const docRef = await addDoc(collection(db, "order"), data);
        currentOrderId = docRef.id;
        
        document.getElementById("qrisImg").src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://link.dana.id/qr/083148583173";
        document.getElementById("displayTotal").innerText = `Rp ${h}`;
        document.getElementById("paymentPopup").classList.replace("hidden", "flex");

        // Kirim WA otomatis
        window.open(`https://wa.me/6283148583173?text=Halo%20Admin%20WOWO,%20Saya%20order%20${data.layanan}%20${data.nominal}.%20ID:%20${data.orderId}.%20Sudah%20bayar%20mohon%20proses.`, '_blank');

        // Pantau Status (Realtime)
        onSnapshot(doc(db, "order", currentOrderId), (snap) => {
            if (snap.exists() && snap.data().status === "Success") {
                document.getElementById("qrisSection").classList.add("hidden");
                document.getElementById("successSection").classList.remove("hidden");
            }
        });
      } catch (err) { alert("Error!"); btn.disabled = false; }
    });

    // RATING SYSTEM
    document.querySelectorAll("#starContainer i").forEach(star => {
        star.addEventListener("click", async () => {
            const val = parseInt(star.dataset.rating);
            document.querySelectorAll("#starContainer i").forEach(s => s.classList.toggle("star-active", s.dataset.rating <= val));
            await updateDoc(doc(db, "order", currentOrderId), { rating: val });
            document.getElementById("ratingStatus").innerText = "Terima kasih atas penilaiannya!";
            document.getElementById("starContainer").style.pointerEvents = "none";
        });
    });
  </script>
</body>
</html>
