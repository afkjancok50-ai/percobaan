<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Game - NEXTGEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; /* Dark theme untuk vibes gaming */
            color: white;
        }
        .step-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
        }
        .game-card {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .game-card.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-5px);
        }
        .nominal-item {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .nominal-item:hover {
            border-color: #6366f1;
        }
        .nominal-item.active {
            background: #6366f1;
            border-color: #818cf8;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .step-number {
            background: #6366f1;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 800;
            font-size: 14px;
        }
        input::placeholder { color: #64748b; }
    </style>
</head>
<body class="pb-20">

<div class="max-w-md mx-auto px-4 pt-10">
    
    <div class="flex items-center justify-between mb-8">
        <a href="top up.html" class="text-gray-400 hover:text-white transition-colors">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
        <img src="NEXTGENLOGO.png" class="h-10">
        <div class="w-6"></div>
    </div>

    <form action="order.html" method="GET" onsubmit="return validateForm()">
        
        <div class="step-card p-5 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="step-number">1</div>
                <h3 class="font-bold">Pilih Game</h3>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="game-card p-2 rounded-2xl text-center cursor-pointer" onclick="selectGame(this, 'MOBILE LEGENDS')">
                    <img src="https://img.utdstc.com/icon/411/506/4115064c58579f1503616e4566c72802d2874f67c3b0185936495674c3e803c5:200" class="w-16 h-16 mx-auto rounded-xl mb-2 object-cover">
                    <p class="text-[10px] font-bold uppercase">MLBB</p>
                </div>
                <div class="game-card p-2 rounded-2xl text-center cursor-pointer" onclick="selectGame(this, 'FREE FIRE')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR0Y6P2R74Cid8W6h0-Y4yP5_a6pIqO6y_V_A&s" class="w-16 h-16 mx-auto rounded-xl mb-2 object-cover">
                    <p class="text-[10px] font-bold uppercase">Free Fire</p>
                </div>
                <div class="game-card p-2 rounded-2xl text-center cursor-pointer" onclick="selectGame(this, 'PUBG MOBILE')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7_eR1iH5Vl96k_tKz6H8GzC6e_1E-iA_W-Q&s" class="w-16 h-16 mx-auto rounded-xl mb-2 object-cover">
                    <p class="text-[10px] font-bold uppercase">PUBG</p>
                </div>
            </div>
            <input type="hidden" name="wallet" id="gameInput" required>
        </div>

        <div class="step-card p-5 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="step-number">2</div>
                <h3 class="font-bold">Lengkapi Data</h3>
            </div>
            <div class="space-y-3">
                <input type="text" name="phone" required 
                    class="w-full bg-[#0f172a] border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 transition-all font-bold text-sm" 
                    placeholder="Masukkan User ID (Server)">
                <p class="text-[10px] text-gray-500 italic px-1">*Contoh: 12345678 (1234)</p>
            </div>
        </div>

        <div class="step-card p-5 mb-8">
            <div class="flex items-center gap-3 mb-4">
                <div class="step-number">3</div>
                <h3 class="font-bold">Pilih Nominal</h3>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="nominal-item p-4 rounded-xl" onclick="setNominal(this, '15.000', '50 Diamonds')">
                    <div class="text-indigo-400 mb-1"><i class="fas fa-gem text-xs"></i></div>
                    <p class="font-bold text-sm">50 Diamonds</p>
                    <p class="text-[11px] text-gray-400 mt-1">Rp 15.000</p>
                </div>
                <div class="nominal-item p-4 rounded-xl" onclick="setNominal(this, '30.000', '100 Diamonds')">
                    <div class="text-indigo-400 mb-1"><i class="fas fa-gem text-xs"></i></div>
                    <p class="font-bold text-sm">100 Diamonds</p>
                    <p class="text-[11px] text-gray-400 mt-1">Rp 30.000</p>
                </div>
                <div class="nominal-item p-4 rounded-xl" onclick="setNominal(this, '75.000', '250 Diamonds')">
                    <div class="text-indigo-400 mb-1"><i class="fas fa-gem text-xs"></i></div>
                    <p class="font-bold text-sm">250 Diamonds</p>
                    <p class="text-[11px] text-gray-400 mt-1">Rp 75.000</p>
                </div>
                <div class="nominal-item p-4 rounded-xl" onclick="setNominal(this, '150.000', '500 Diamonds')">
                    <div class="text-indigo-400 mb-1"><i class="fas fa-gem text-xs"></i></div>
                    <p class="font-bold text-sm">500 Diamonds</p>
                    <p class="text-[11px] text-gray-400 mt-1">Rp 150.000</p>
                </div>
            </div>
            <input type="hidden" name="nominal" id="nominalInput">
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900 border-t border-slate-800 flex justify-center">
            <button type="submit" class="w-full max-w-md bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold uppercase shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
                Beli Sekarang
            </button>
        </div>

    </form>
</div>

<script>
    function selectGame(el, gameName) {
        document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('gameInput').value = gameName;
    }

    function setNominal(el, price, label) {
        document.querySelectorAll('.nominal-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        // Kita kirim format harga ke order.html
        document.getElementById('nominalInput').value = price;
    }

    function validateForm() {
        const game = document.getElementById('gameInput').value;
        const nominal = document.getElementById('nominalInput').value;
        
        if (!game) { alert("Silakan pilih game terlebih dahulu!"); return false; }
        if (!nominal) { alert("Silakan pilih nominal produk!"); return false; }
        return true;
    }
</script>

</body>
</html>
