<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order WOWO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d0d15;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .form-container {
            background-color: #1c1c28;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #2d2d3f;
        }
        .input-field {
            background-color: #2d2d3f;
            border: 1px solid #3d3d52;
            color: #ffffff;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        .btn-submit {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white;
            font-weight: 700;
            padding: 1rem;
            border-radius: 0.75rem;
            width: 100%;
            margin-top: 1.5rem;
            transition: transform 0.2s;
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white flex items-center justify-center gap-2">
                🚀 Form Order WOWO
            </h1>
        </div>

        <form id="orderForm" class="space-y-4">
            <div>
                <input type="text" id="nama" placeholder="Nama" class="input-field" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="wa" placeholder="No WA" class="input-field" required>
                <input type="text" id="layanan" class="input-field" placeholder="Layanan" readonly>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="nominal" placeholder="Nominal" class="input-field" required>
                <input type="text" id="tujuan" placeholder="Tujuan" class="input-field" required>
            </div>

            <button type="submit" class="btn-submit">Kirim Order</button>
        </form>
    </div>

    <script>
        // Mengambil parameter 'prod' dari URL (contoh: order.html?prod=DANA)
        const urlParams = new URLSearchParams(window.location.search);
        const produk = urlParams.get('prod');
        if (produk) {
            document.getElementById('layanan').value = produk;
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value;
            const wa = document.getElementById('wa').value;
            const layanan = document.getElementById('layanan').value;
            const nominal = document.getElementById('nominal').value;
            const tujuan = document.getElementById('tujuan').value;

            // Format Pesan WhatsApp
            const pesan = `Halo WOWO, saya ingin order:%0A%0A` +
                          `*Nama:* ${nama}%0A` +
                          `*No WA:* ${wa}%0A` +
                          `*Layanan:* ${layanan}%0A` +
                          `*Nominal:* ${nominal}%0A` +
                          `*Tujuan/ID:* ${tujuan}`;

            window.open(`https://wa.me/6283148583173?text=${pesan}`, '_blank');
        });
    </script>
</body>
</html>
