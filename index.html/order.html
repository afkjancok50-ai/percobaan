<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Pesanan - NEXTGEN</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F3F4F6; }
        .receipt-shape { position: relative; background: white; border-radius: 2.5rem; }
        .receipt-shape::after {
            content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 20px;
            background-image: radial-gradient(circle, white 70%, transparent 75%);
            background-size: 20px 20px; background-position: 0 -10px;
        }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.26, 0.53, 0.74, 1.48); }
        @keyframes pop {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        #qrModal { display: none; }
        #qrModal.active { display: flex; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 text-[#1e1b7e]">

<div id="mainContent" class="w-full max-w-md animate-pop">

    <div class="text-center mb-8">
        <img src="NEXTGENLOGO.png" alt="Logo" class="h-14 mx-auto">
    </div>

    <div class="receipt-shape shadow-2xl overflow-hidden">
        <div class="bg-[#1e1b7e] p-6 text-white text-center">
            <h2 class="text-xl font-black uppercase">Ringkasan Order</h2>
            <p id="orderId" class="text-[10px] opacity-60 tracking-[0.3em] mt-1 font-bold"></p>
        </div>

        <div class="p-8 space-y-6">
            <div>
                <p class="text-gray-400 text-[10px] font-bold uppercase">Layanan</p>
                <p id="resWallet" class="font-black text-xl">---</p>
            </div>

            <div>
                <p class="text-gray-400 text-[10px] font-bold uppercase">Nomor Tujuan</p>
                <p id="resPhone" class="font-black text-xl">---</p>
            </div>

            <hr class="border-dashed">

            <div class="space-y-3 text-sm font-semibold">
                <div class="flex justify-between">
                    <span class="text-gray-400">Nominal</span>
                    <span id="resNominal">Rp 0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-400">Biaya Admin</span>
                    <span>Rp 2.000</span>
                </div>
            </div>

            <div class="bg-orange-50 p-5 rounded-[2rem] flex justify-between">
                <span class="font-bold text-gray-900">Total Bayar</span>
                <span id="resTotal" class="text-[#f37021] text-2xl font-black">Rp 0</span>
            </div>

            <button onclick="showQRCode()"
                class="w-full bg-[#1e1b7e] text-white py-5 rounded-2xl font-black shadow-lg hover:bg-blue-900 transition-all">
                BAYAR SEKARANG
            </button>

            <button onclick="window.history.back()"
                class="w-full text-gray-400 font-bold text-xs uppercase">
                Kembali & Ubah
            </button>
        </div>
    </div>
</div>

<div id="qrModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-6 hidden">
    <div class="bg-white w-full max-w-sm rounded-[3rem] overflow-hidden shadow-2xl">
        
        <div class="bg-[#008CFF] p-6 text-white text-center">
            <h3 class="font-black text-sm uppercase">Pembayaran via QRIS</h3>
        </div>

        <div class="p-8 text-center">
            <img id="qrImage" src="qris.jpg"
                class="w-48 h-48 mx-auto mb-4 object-contain rounded-xl shadow">

            <p id="resTotalModal" class="font-black text-2xl mb-6">Rp 0</p>

            <div class="mb-6 text-left border-t border-gray-100 pt-4">
                <label class="text-[10px] font-bold text-gray-400 uppercase block mb-2">Unggah Bukti Transfer</label>
                <input type="file" id="uploadBukti" accept="image/*" 
                    class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"
                    onchange="previewImage(event)">
                
                <div id="previewContainer" class="hidden mt-3">
                    <img id="imgPreview" src="#" class="w-full h-32 object-cover rounded-xl border border-dashed border-gray-300">
                </div>
            </div>

            <button onclick="sendWhatsApp()"
                class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black mb-3 shadow-md hover:bg-green-600 transition-all">
                KONFIRMASI VIA WA
            </button>

            <button onclick="closeModal()" class="text-gray-400 text-xs font-bold uppercase tracking-widest">
                Tutup
            </button>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone');
    const nominal = params.get('nominal');
    const wallet = params.get('wallet');

    let globalTotal = "";
    let orderIdGlobal = "";

    // Inisialisasi Data dari URL
    if(phone && nominal && wallet){
        orderIdGlobal = "NG-" + Math.floor(Math.random() * 1000000);
        document.getElementById('orderId').innerText = orderIdGlobal;
        document.getElementById('resWallet').innerText = wallet.toUpperCase() + " TOP UP";
        document.getElementById('resPhone').innerText = phone;
        document.getElementById('resNominal').innerText = "Rp " + nominal;

        const adminFee = 2000;
        const total = parseInt(nominal.replace(/\./g,'')) + adminFee;
        globalTotal = total.toLocaleString('id-ID');

        document.getElementById('resTotal').innerText = "Rp " + globalTotal;
        document.getElementById('resTotalModal').innerText = "Rp " + globalTotal;
    } else {
        // Jika parameter tidak lengkap, lempar balik ke halaman utama
        // window.location.href = "topup.html"; 
    }

    // Fungsi Modal
    function showQRCode(){
        const modal = document.getElementById('qrModal');
        modal.classList.remove('hidden');
        modal.classList.add('active');
    }

    function closeModal(){
        const modal = document.getElementById('qrModal');
        modal.classList.add('hidden');
        modal.classList.remove('active');
    }

    // Fungsi Preview Gambar
    function previewImage(event) {
        const reader = new FileReader();
        const preview = document.getElementById('imgPreview');
        const container = document.getElementById('previewContainer');

        reader.onload = function(){
            preview.src = reader.result;
            container.classList.remove('hidden');
        }
        
        if(event.target.files[0]){
            reader.readAsDataURL(event.target.files[0]);
        }
    }

    // Fungsi Kirim WhatsApp
    function sendWhatsApp(){
        const message =
            `Halo Admin NextGen,%0A%0A` +
            `Saya sudah melakukan pembayaran:%0A%0A` +
            `🧾 *ID Order:* ${orderIdGlobal}%0A` +
            `📦 *Layanan:* ${wallet.toUpperCase()}%0A` +
            `📱 *Nomor Tujuan:* ${phone}%0A` +
            `💰 *Total Transfer:* Rp ${globalTotal}%0A%0A` +
            `Mohon segera diproses. Bukti transfer saya lampirkan di bawah ini:`;

        // Ganti nomor di bawah dengan nomor WhatsApp admin kamu
        window.open(`https://wa.me/6281324038810?text=${message}`, '_blank');
    }
</script>

</body>
</html>
