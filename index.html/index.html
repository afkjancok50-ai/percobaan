  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
      authDomain: "uasbima-2c5d7.firebaseapp.com",
      projectId: "uasbima-2c5d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const testiContainer = document.getElementById("testiContainer");

    const q = query(
      collection(db, "order"), 
      where("status", "==", "Success"), 
      where("rating", ">", 0),
      orderBy("rating", "desc"),
      limit(6)
    );

    onSnapshot(q, (snapshot) => {
      if (snapshot.empty) {
        testiContainer.innerHTML = '<p class="col-span-full text-xs text-gray-400 italic">Belum ada penilaian.</p>';
        return;
      }
      testiContainer.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        const nama = data.nama || "User";
        const namaSensor = nama.length > 2 ? nama.substring(0, 2) + "***" : nama;
        
        let starsHtml = "";
        for (let i = 1; i <= 5; i++) {
          starsHtml += `<i class="fa-solid fa-star ${i <= (data.rating || 0) ? 'star-gold' : 'text-gray-200'} text-[8px]"></i>`;
        }

        testiContainer.innerHTML += `
          <div class="testi-card text-left">
            <div class="flex justify-between items-center mb-1">
              <h4 class="font-black text-gray-800 text-[9px] uppercase">${namaSensor}</h4>
              <div class="flex gap-0.5">${starsHtml}</div>
            </div>
            <p class="text-[7px] text-blue-500 font-bold uppercase mb-1">${data.layanan || ''}</p>
            <p class="text-[8px] text-gray-500 italic">"Mantap, cepat!"</p>
          </div>
        `;
      });
    });
  </script>
