    .btn-mobile-item:active { transform: scale(0.92); background-color: #f0f7ff; }

    .logo-box { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .profile-img-container { width: 40px; height: 40px; border-radius: 9999px; overflow: hidden; border: 2px solid rgba(255, 255, 255, 0.5); }
    .testi-card { background: white; border-radius: 1.25rem; padding: 1rem; border: 1px solid rgba(0,0,0,0.05); }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB9bCpEzdmfOlHGRwedqkofqgR44EiI4Xc",
      authDomain: "uasbima-2c5d7.firebaseapp.com",
      projectId: "uasbima-2c5d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const testiContainer = document.getElementById("testiContainer");

    const q = query(collection(db, "order"), where("status", "==", "Success"), where("rating", ">", 0), orderBy("rating", "desc"), limit(6));

    onSnapshot(q, (snapshot) => {
      testiContainer.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        let stars = "";
        for (let i = 1; i <= 5; i++) stars += `<i class="fa-solid fa-star ${i <= data.rating ? 'star-gold' : 'text-gray-200'} text-[8px] md:text-xs"></i>`;
        testiContainer.innerHTML += `
          <div class="testi-card text-left">
            <div class="flex justify-between items-start mb-2">
              <div>
                <h4 class="font-black text-gray-800 text-[9px] md:text-sm uppercase">${data.nama ? data.nama.substring(0,2)+'***' : 'User'}</h4>
                <p class="text-[7px] md:text-[9px] text-blue-500 font-bold uppercase">${data.layanan || ''}</p>
              </div>
              <div class="flex gap-0.5">${stars}</div>
            </div>
          </div>
        `;
      });
    });
  </script>
