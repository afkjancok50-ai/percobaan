<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paket Data - NEXTGEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #F4F7FE;
            min-height: 100vh; 
        }
        
        .glass-card { 
            background: white; 
            border-radius: 2rem; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
        }
        
        /* Ukuran logo diperbesar */
        .provider-img { 
            height: 48px; /* Diperbesar dari 35px */
            width: auto;
            filter: grayscale(1); 
            opacity: 0.15; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            object-fit: contain;
        }
        
        .provider-img.active { 
            filter: grayscale(0); 
            opacity: 1; 
            transform: scale(1.6); /* Skala diperbesar agar lebih jelas */
            z-index: 20;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
        }

        .pkg-card { 
            border: 2px solid #F1F5F9; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            border-radius: 1.25rem; 
            background: white;
        }

        .pkg-card:hover { 
            border-color: #4F46E5; 
            background-color: #F8FAFF;
            transform: translateY(-2px);
        }

        .selected-pkg { 
            border-color: #4F46E5 !important; 
            background-color: #EEF2FF !important; 
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="pb-10">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 mb-6">
        <div class="max-w-md mx-auto px-6 py-4 flex items-center justify-between">
            <a href="top up.html" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
                <i class="fas fa-chevron-left text-gray-700"></i>
            </a>
            <img src="NEXTGENLOGO.png" alt="Logo" class="h-7">
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4">
        <div class="glass-card p-6 mb-6">
            <div class="mb-2">
                <label class="block text-indigo-900 font-extrabold text-[11px] uppercase tracking-[0.15em] mb-3 opacity-50">Nomor Telepon</label>
                <div class="relative mb-8">
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 flex items-center gap-2 pr-3 border-r border-gray-200">
                        <span class="text-gray-400 font-bold text-base">+62</span>
                    </div>
                    <input id="phoneInput" type="number" oninput="handleDetection()" placeholder="812345678" 
                        class="w-full pl-20 pr-6 py-5 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none font-bold text-xl tracking-widest transition-all">
                </div>

                <div class="flex justify-between items-center bg-gray-50/80 px-8 py-10 rounded-3xl border border-gray-100 overflow-visible">
                    <img src="telkomsel.png" class="provider-img" id="logo-telkomsel" alt="Telkomsel">
                    <img src="indosat.png" class="provider-img" id="logo-indosat" alt="Indosat">
                    <img src="xl.png" class="provider-img" id="logo-xl" alt="XL">
                    <img src="axis.png" class="provider-img" id="logo-axis" alt="Axis">
                    <img src="tree.png" class="provider-img" id="logo-tri" alt="Tri">
                </div>
            </div>
        </div>

        <div id="packageSection" class="hidden animate-fade">
            <div class="flex items-center gap-3 mb-5 px-1">
                <div class="h-5 w-1.5 bg-indigo-600 rounded-full"></div>
                <h3 class="text-indigo-900 font-black text-sm uppercase tracking-wider">
                    Paket <span id="targetProvider" class="text-indigo-600"></span>
                </h3>
            </div>
            
            <div id="packageContainer" class="grid gap-3"></div>

            <button onclick="checkout()" class="w-full mt-8 bg-indigo-600 text-white py-5 rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95 flex items-center justify-center gap-3">
                BELI SEKARANG <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </div>
    </main>

    <script>
        let selectedData = { name: "", price: "" };
        let activeProvider = "";

        const databasePaket = {
            telkomsel: [
                { name: "Internet OMG! 5GB", price: "36.000", desc: "30 Hari - Kuota Utama 24 Jam" },
                { name: "Internet OMG! 15GB", price: "98.000", desc: "30 Hari - Full Nasional" }
            ],
            axis: [
                { name: "5GB", price: "13.970", desc: "3 Hari - Promo Bronet 24Jam" },
                { name: "10GB", price: "33.450", desc: "10 Hari - Kuota Utama + Chat" },
                { name: "45GB", price: "96.970", desc: "30 Hari - 30GB Utama + 15GB Lokal" },
                { name: "Unlimited", price: "25.900", desc: "1 Hari - AIGO Unlimited 24 Jam" }
            ],
            tri: [
                { name: "6GB", price: "10.950", desc: "2 Hari - Happy Kuota 24 Jam" },
                { name: "12GB", price: "19.990", desc: "3 Hari - 9GB Utama + 3GB 5G" },
                { name: "Ramadan 20GB", price: "19.990", desc: "3 Hari - Kuota Berkah" }
            ],
            indosat: [
                { name: "Freedom 3GB", price: "15.500", desc: "30 Hari - Full Kuota Utama" }
            ],
            xl: [
                { name: "Xtra Mini 5GB", price: "14.500", desc: "7 Hari - Nasional" }
            ]
        };

        const prefixMap = {
            '811': 'telkomsel', '812': 'telkomsel', '813': 'telkomsel', '821': 'telkomsel',
            '831': 'axis', '838': 'axis',
            '895': 'tri', '896': 'tri', '897': 'tri', '898': 'tri',
            '856': 'indosat', '857': 'indosat', '858': 'indosat',
            '817': 'xl', '818': 'xl', '819': 'xl', '877': 'xl'
        };

        function handleDetection() {
            let input = document.getElementById('phoneInput').value;
            if (input.startsWith('0')) { input = input.substring(1); }

            const section = document.getElementById('packageSection');
            const container = document.getElementById('packageContainer');
            
            document.querySelectorAll('.provider-img').forEach(img => img.classList.remove('active'));

            if (input.length >= 3) {
                const prefix = input.substring(0, 3);
                const provider = prefixMap[prefix];

                if (provider) {
                    activeProvider = provider;
                    document.getElementById(`logo-${provider}`).classList.add('active');
                    document.getElementById('targetProvider').innerText = provider.toUpperCase();
                    section.classList.remove('hidden');

                    let cards = "";
                    (databasePaket[provider] || []).forEach(pkt => {
                        cards += `
                            <div onclick="selectPkg('${pkt.name}', '${pkt.price}', this)" class="pkg-card p-5 flex justify-between items-center">
                                <div>
                                    <p class="font-bold text-indigo-900 text-base mb-1">${pkt.name}</p>
                                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wide">${pkt.desc}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-black text-indigo-600 text-lg">Rp ${pkt.price}</p>
                                </div>
                            </div>
                        `;
                    });
                    container.innerHTML = cards;
                } else {
                    section.classList.add('hidden');
                }
            } else {
                section.classList.add('hidden');
            }
        }

        function selectPkg(name, price, el) {
            selectedData = { name, price };
            document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('selected-pkg'));
            el.classList.add('selected-pkg');
        }

        function checkout() {
            const phone = document.getElementById('phoneInput').value;
            if (!selectedData.name) return alert("Silahkan pilih paket data terlebih dahulu!");
            let cleanPhone = phone.startsWith('0') ? phone : '0' + phone;
            window.location.href = `order.html?phone=${cleanPhone}&nominal=${selectedData.price}&wallet=${activeProvider.toUpperCase()} - ${selectedData.name}`;
        }
    </script>
</body>
</html>
