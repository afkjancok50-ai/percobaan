  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    :root { --brimo-blue: #00529C; --brimo-dark: #002D57; --brimo-light: #F4F7FA; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--brimo-light); }
    
    .nav-gradient { background: linear-gradient(to right, var(--brimo-dark), var(--brimo-blue)); z-index: 100; }
    
    /* Perbaikan Hero Section: Hilangkan clip-path yang memotong konten */
    .hero-section { 
      background: linear-gradient(135deg, var(--brimo-dark) 0%, var(--brimo-blue) 100%); 
      position: relative; 
      z-index: 10; 
      padding-bottom: 120px;
      border-radius: 0 0 50px 50px; /* Lengkungan bawah sebagai pengganti clip-path agar aman */
    }

    /* PC Card Style */
    .service-card-pc { 
      background: white; 
      border-radius: 2.5rem; 
      transition: all 0.4s ease; 
      border: 1px solid rgba(0, 82, 156, 0.08);
      position: relative;
      z-index: 30; /* Pastikan di atas hero */
    }
    .service-card-pc:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0, 82, 156, 0.12); }

    /* Mobile Style */
    .btn-mobile { 
      background: white; 
      border-radius: 1.25rem; 
      padding: 1rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .logo-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .profile-img-container { width: 40px; height: 40px; border-radius: 9999px; overflow: hidden; border: 2px solid white; }
  </style>
</head>
